apis:
  - aid: data-gov-bc-ca:catalog
    name: British Columbia (DataBC) CKAN Action API
    description: >-
      CKAN Action API for British Columbia (DataBC), a consistent JSON-over-HTTP interface over a catalog of 3,346 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://www.data.gov.bc.ca/api/3/action/.
    humanURL: https://www.data.gov.bc.ca
