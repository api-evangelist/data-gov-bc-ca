aid: data-gov-bc-ca
name: British Columbia (DataBC)
description: >-
  British Columbia (DataBC) is a open data portal open-data portal for Canada running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 3,346 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
